name: CI

on:
  push:
    branches: ["main"]
  pull_request:

permissions:
  contents: read

jobs:
  build-and-test:
    runs-on: ubuntu-22.04

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.10"

      - name: Set up ROS 2 Humble
        uses: ros-tooling/setup-ros@v0.7
        with:
          required-ros-distributions: humble

      - name: Install build tools
        shell: bash
        run: |
          sudo apt-get update
          sudo apt-get install -y python3-colcon-common-extensions python3-rosdep
          if [ ! -f /etc/ros/rosdep/sources.list.d/20-default.list ]; then
            sudo rosdep init
          fi
          rosdep update

      - name: Install package dependencies
        shell: bash
        run: |
          rosdep install --from-paths . --ignore-src -r -y --rosdistro humble

      - name: Run unit tests
        shell: bash
        run: |
          python3 -m unittest \
            dggrs_spatial_math.test.test_core \
            dggrs_bridge.test.test_core \
            dggrs_vision.test.test_tracker \
            dggrs_bringup.test.test_demo_pipeline \
            dggrs_bringup.test.test_mock_inputs \
            dggrs_bringup.test.test_workflows

      - name: Check Python module syntax
        shell: bash
        run: |
          python3 -m compileall dggrs_vision dggrs_streamer dggrs_spatial_math dggrs_bridge dggrs_bringup

      - name: Build workspace
        shell: bash
        run: |
          source /opt/ros/humble/setup.bash
          colcon build --symlink-install --event-handlers console_direct+
